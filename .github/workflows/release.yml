name: CI

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag whose CHANGELOG.md patchnotes should be posted to Discord"
        required: true
        type: string

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate repo-managed locales
        run: python3 scripts/validate_repo_locales.py

      - name: Hack around https://github.com/actions/checkout/issues/290
        run: |
          git fetch --tags --force

      - name: Install and run Luacheck
        uses: nebularg/actions-luacheck@v1
        with:
          args: "--no-color -q"
          annotate: warning

      # - name: Generate Changelog
      #   run: ./generate_changelog.sh

      - name: Install LibEQOL
        uses: R41z0r/LibEQOL@v1.0.0
        with:
          destination: EnhanceQoL/libs

      - name: Create Package and release
        uses: BigWigsMods/packager@v2
        env:
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          CF_API_KEY: ${{ secrets.CURSE_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          WOWI_API_TOKEN: ${{ secrets.WOWI }}

  discord_patchnotes:
    needs: release
    if: always() && (github.event_name == 'workflow_dispatch' || (startsWith(github.ref, 'refs/tags/') && needs.release.result == 'success'))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Post patchnotes to Discord
        run: python3 scripts/post_discord_patchnotes.py
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          DISCORD_BETA_WEBHOOK: ${{ secrets.DISCORD_BETA_WEBHOOK }}
          DISCORD_ALPHA_WEBHOOK: ${{ secrets.DISCORD_ALPHA_WEBHOOK }}
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
